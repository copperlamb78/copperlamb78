name: GitHub Metrics

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: copperlamb78

          template: classic
          base: header, activity, community, repositories, metadata
          filename: github-metrics.svg
          config_timezone: America/Bahia

          plugins_errors_fatal: no

          config_order: base.header, isocalendar, languages, habits, activity, repositories, lines

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 30
          plugin_habits_facts: yes
          plugin_habits_charts: no

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_days: 0
          plugin_activity_filter: push, issue, pr, release, ref/create

          plugin_repositories: yes
          plugin_repositories_featured: copperlamb78/toolkit, copperlamb78/copperlamb78

          plugin_lines: yes
